<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Hello Kitty Face -->
  <ellipse cx="50" cy="55" rx="38" ry="35" fill="#FFFFFF" stroke="#333" stroke-width="2"/>
  <!-- Left Ear -->
  <path d="M18 30 Q15 10 30 20" fill="#FFFFFF" stroke="#333" stroke-width="2"/>
  <!-- Right Ear -->
  <path d="M82 30 Q85 10 70 20" fill="#FFFFFF" stroke="#333" stroke-width="2"/>
  <!-- Bow (right ear) -->
  <ellipse cx="82" cy="22" rx="12" ry="8" fill="#FF6B8A" stroke="#E3170A" stroke-width="1.5" transform="rotate(-15 82 22)"/>
  <ellipse cx="82" cy="22" rx="12" ry="8" fill="#FF6B8A" stroke="#E3170A" stroke-width="1.5" transform="rotate(25 82 22)"/>
  <circle cx="82" cy="22" r="3" fill="#E3170A"/>
  <!-- Left Eye -->
  <ellipse cx="38" cy="52" rx="3.5" ry="4" fill="#333"/>
  <!-- Right Eye -->
  <ellipse cx="62" cy="52" rx="3.5" ry="4" fill="#333"/>
  <!-- Nose -->
  <ellipse cx="50" cy="60" rx="3" ry="2.5" fill="#FFB347"/>
  <!-- Left Whisker -->
  <line x1="12" y1="55" x2="30" y2="58" stroke="#333" stroke-width="1.5"/>
  <line x1="12" y1="62" x2="30" y2="62" stroke="#333" stroke-width="1.5"/>
  <line x1="12" y1="69" x2="30" y2="66" stroke="#333" stroke-width="1.5"/>
  <!-- Right Whisker -->
  <line x1="88" y1="55" x2="70" y2="58" stroke="#333" stroke-width="1.5"/>
  <line x1="88" y1="62" x2="70" y2="62" stroke="#333" stroke-width="1.5"/>
  <line x1="88" y1="69" x2="70" y2="66" stroke="#333" stroke-width="1.5"/>
</svg>
